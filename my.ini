[WinMySQLAdmin]
Server=E:/mysql-4.1.21/bin/mysqld-nt.exe
user=root
password=root

[mysqld]
basedir=E:/mysql-4.1.21
#bind-address=192.168.1.3
datadir=E:/mysql-4.1.21/data
language=E:/mysql-4.1.21/share/english
#slow query log#=
#tmpdir#=
#port=3306

# MyISAM - Increase performance 
#key_buffer_size=32M - If you increase key_buffer_size, you are giving more RAM to MyISAM, which might actually make your InnoDB tables slower because you're taking memory away from the OS and the InnoDB pool.

# Increase memory allocation
innodb_buffer_pool_size=5368709120 # Keeps data pages in RAM. ; 70% - 80% of the total RAM if the server its dedicated (6012954214 - 70% 8GB ; 6871947673 - 80% 8GB). 1024 MB to prevent swapping - 1.5 GB is the practical limit for 32-bit MySQL.
# TIP: If you find that many queries are stuck in "Locked" or "Sending data," increasing your innodb_buffer_pool_size (as we discussed) is the best way to prevent them from becoming "slow queries" in the first place by keeping the data in RAM.
innodb_additional_mem_pool_size=20971520 # 20 MB
innodb_log_buffer_size=8388608 # 8 MB
# Trade some safety for massive speed
innodb_flush_log_at_trx_commit=2 # Essential for Windows/InnoDB speed. This setting relaxes the flush requirement. Instead of flushing to disk on every commit, it writes to the operating system cache and flushes to the disk once per second. This significantly reduces disk I/O with a minimal risk (potentially losing up to 1 second of transactions only in the event of an OS crash or power outage, not a MySQL crash).
# General performance
query_cache_type = 1 # Turns on the "Repeat Query" fast-lane.
query_cache_size = 128M # RAM dedicated to result sets.
query_cache_limit = 1M # (Prevents one giant query from wiping out the whole cache).
thread_cache_size=32 # Set to 16 or 32. This keeps threads alive so MySQL doesn't have to spend CPU cycles creating a new thread for every repeated connection.
innodb_thread_concurrency=0 # On an E5-2603 (which has 6 cores), set this to 6 or 0 (0 lets InnoDB manage it automatically).
table_cache=1024 # Keeps table handles open for repeated access.
# To utilize your 8GB RAM, you must enable AWE (Address Windowing Extensions).
# 1. Grant "Lock Pages in Memory" to the Windows user running the MySQL service.
# 2. Uncomment the next line:
# innodb_buffer_pool_awe_mem_mb=5120 # 5 GB - Only AWE can only be used in Windows 2000 and later. To use AWE, InnoDB must be compiled with __WIN2000__ defined
# 3. If AWE is enabled, change innodb_buffer_pool_size above to 536870912 (500 MB window size).
innodb_log_file_size=1342177280 # 25% of the innodb_buffer_pool_size value; of the 512 MB
innodb_data_file_path=ibdata1:10M:autoextend
innodb_file_per_table # Good for manageability. New tables will be created in their own .ibd file.

# Logs
log-slow-queries=slow-queries.log # Enabling the slow query log helps identify specific queries that take a long time to execute, which might be causing full table scans or other I/O-intensive operations.
long_query_time=2
log-queries-not-using-indexes